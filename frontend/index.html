<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocoin · 个人记账</title>
  <link rel="stylesheet" href="/css/styles.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="layout">
    <nav id="sidebar">
      <div class="logo">💰 Autocoin</div>
      <a href="#/dashboard" data-route="/dashboard">
        <span class="icon">📊</span> 概览
      </a>
      <a href="#/transactions" data-route="/transactions">
        <span class="icon">📋</span> 账单
      </a>
      <a href="#/import" data-route="/import">
        <span class="icon">📥</span> 导入
      </a>
      <a href="#/stats" data-route="/stats">
        <span class="icon">📈</span> 统计
      </a>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-user">
        <span id="user-display"></span>
        <button onclick="logout()" class="btn-logout" title="退出登录">退出</button>
      </div>
    </nav>
    <main id="app">
      <div class="loading">加载中...</div>
    </main>
  </div>

  <!-- Bottom tab bar for mobile -->
  <nav id="bottom-bar">
    <a href="#/dashboard" data-route="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>概览</span>
    </a>
    <a href="#/transactions" data-route="/transactions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>账单</span>
    </a>
    <a href="#/import" data-route="/import">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span>导入</span>
    </a>
    <a href="#/stats" data-route="/stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>统计</span>
    </a>
    <a href="javascript:void(0)" id="bottom-bar-me">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>

  <script src="/js/api.js?v=4"></script>
  <script src="/js/charts.js?v=4"></script>
  <script src="/js/auth.js?v=4"></script>
  <script src="/js/dashboard.js?v=4"></script>
  <script src="/js/transactions.js?v=4"></script>
  <script src="/js/import.js?v=4"></script>
  <script src="/js/stats.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
</body>
</html>
